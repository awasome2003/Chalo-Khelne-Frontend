[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_BASE_URL = "https://chalo-khelne-backend-hp3z.onrender.com/api"
  VITE_API_BASE_URL_QR = "https://chalo-khelne-backend-hp3z.onrender.com/uploads"

# Redirect /api/* calls to the live backend
[[redirects]]
  from = "/api/*"
  to = "https://chalo-khelne-backend-hp3z.onrender.com/api/:splat"
  status = 200
  force = true

# Redirect /uploads/* to backend
[[redirects]]
  from = "/uploads/*"
  to = "https://chalo-khelne-backend-hp3z.onrender.com/uploads/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
